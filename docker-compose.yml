services:
  db:
    image: postgis/postgis:16-3.4
    container_name: sierraviva-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sierra
      POSTGRES_PASSWORD: sierra
      POSTGRES_DB: sierraviva
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sierra -d sierraviva"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
